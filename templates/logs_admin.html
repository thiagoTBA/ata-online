<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Logs Gerais</title>

<style>
:root{
  --bg:#020617;
  --card:#111827;
  --soft:#1f2937;
  --text:#e5e7eb;
  --muted:#9ca3af;

  --green:#22c55e;
  --blue:#3b82f6;
  --red:#ef4444;
  --purple:#8b5cf6;
}

body{
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
  margin:0;
}

/* CONTAINER */
.container{
  max-width:1100px;
  margin:auto;
  padding:25px;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.header h2{
  margin:0;
}

/* NAV */
.nav{
  margin-bottom:20px;
}

.nav a{
  color:#60a5fa;
  text-decoration:none;
  margin-right:10px;
}

/* LOG CARD */
.log-card{
  background:var(--card);
  border-radius:12px;
  padding:18px;
  margin-bottom:12px;
  box-shadow:0 0 0 1px #111;
  transition:0.2s;
}

.log-card:hover{
  background:var(--soft);
}

/* TOP */
.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
}

/* USER */
.user{
  font-weight:bold;
}

/* TAG */
.tag{
  padding:5px 10px;
  border-radius:999px;
  font-size:12px;
  font-weight:bold;
}

.tag.login{ background:rgba(34,197,94,0.2); color:#4ade80;}
.tag.acao{ background:rgba(59,130,246,0.2); color:#60a5fa;}
.tag.erro{ background:rgba(239,68,68,0.2); color:#f87171;}

/* INFO GRID */
.info{
  display:grid;
  gap:6px;
  font-size:14px;
  margin-top:10px;
}

/* TIME */
.time{
  font-size:12px;
  color:var(--muted);
  text-align:right;
  margin-top:10px;
}

/* EMPTY */
.empty{
  color:var(--muted);
}
</style>
</head>

<body>

<div class="container">

<div class="header">
  <h2>🌐 Logs Gerais (Admin)</h2>
</div>

<div class="nav">
  <a href="/">🏠 Início</a>
  <a href="/admin/logs_unidade">🏢 Logs Unidade</a>
</div>

{% for log in logs %}
<div class="log-card">

  <div class="top">
    <div class="user">
      👤 {{ log.username or "Sistema" }}
    </div>

    <div class="tag acao">
      {{ log.acao }}
    </div>
  </div>

  <div class="info">
    <div>🏢 <b>{{ log.unidade }}</b></div>
    <div>📄 {{ log.detalhes }}</div>
  </div>

  <div class="time">
    ⏱️ {{ log.criado_em }}
  </div>

</div>
{% endfor %}

{% if not logs %}
  <p class="empty">Nenhum log encontrado.</p>
{% endif %}

</div>

</body>
</html>
