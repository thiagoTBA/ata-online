<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root{
  --primary:#2563eb;
  --bg1:#020617;
  --bg2:#1e293b;
  --bg3:#2563eb;
}
* {
  box-sizing: border-box;
}
body{
  margin:0;
  font-family:system-ui;
  background: linear-gradient(135deg, var(--bg1), var(--bg2), var(--bg3));
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.08);
  padding:30px;
  border-radius:20px;
  width:90%;
  max-width:380px;
  color:white;
  animation:fadeIn 0.4s ease;
  box-shadow:0 20px 60px rgba(0,0,0,0.4);
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;transform:translateY(0);}
}

h2{
  margin-bottom:15px;
}

/* INPUT GROUP */
.input-group{
  position:relative;
  margin-top:12px;
}

.input-group input{
  width:100%;
  max-width:100%;
  padding:12px 40px 12px 12px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,0.1);
  background:rgba(255,255,255,0.05);
  color:white;
  outline:none;
}

.input-group input::placeholder{
  color:#cbd5f5;
}

.input-group input:focus{
  border-color:var(--primary);
  box-shadow:0 0 0 2px rgba(37,99,235,0.3);
}

/* ICON */
.icon{
  position:absolute;
  right:12px;
  top:50%;
  transform:translateY(-50%);
  cursor:pointer;
  opacity:0.7;
}

.icon:hover{
  opacity:1;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  margin-top:18px;
  background:var(--primary);
  border:none;
  border-radius:10px;
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  transform:translateY(-1px);
  box-shadow:0 5px 20px rgba(37,99,235,0.4);
}

/* ERROR */
.error{
  background:#7f1d1d;
  color:#fecaca;
  padding:10px;
  border-radius:8px;
  margin-top:10px;
  text-align:center;
}

/* FOOTER */
.footer{
  margin-top:12px;
  text-align:center;
  font-size:13px;
}

.footer a{
  color:#93c5fd;
  text-decoration:none;
}

.forgot{
  display:inline-block;
  margin-top:5px;
  padding:6px 10px;
  border-radius:8px;
  color:#93c5fd;
  transition:0.2s;
}

.forgot:hover{
  background:rgba(37,99,235,0.15);
  color:white;
}

.footer-box{
  margin-top:15px;
  padding:10px;
  border-radius:10px;
  background:rgba(255,255,255,0.03);
  text-align:center;
  font-size:13px;
}

.footer-box a{
  display:block;
  margin-top:5px;
  color:#93c5fd;
  font-weight:500;
  text-decoration:none;
}

.footer-box a:hover{
  color:white;
}
</style>
</head>

<body>

<div class="card">

  <h2>🔐 Acesso ao Sistema</h2>

  {% if error %}
    <div class="error">{{ error }}</div>
  {% endif %}

  <form method="POST">

    <div class="input-group">
      <input name="username" placeholder="Usuário (CPF)" required>
      <span class="icon">👤</span>
    </div>

    <div class="input-group">
      <input id="password" name="password" type="password" placeholder="Senha" required>
      <span class="icon" onclick="togglePassword()">👁️</span>
    </div>

    <label style="font-size:13px; display:flex; align-items:center; gap:6px; margin-top:10px;">
      <input type="checkbox" name="remember"> Lembrar de mim
    </label>

    <button id="btnLogin">Entrar</button>

  </form>

<div class="footer-box">
  <span>Problemas para acessar?</span>
  <a href="/esqueci">Recuperar senha</a>
</div>

</div>

<script>
function togglePassword(){
  const input = document.getElementById("password");
  input.type = input.type === "password" ? "text" : "password";
}

/* 🔥 LOADING BUTTON */
document.querySelector("form").addEventListener("submit", function(){
  const btn = document.getElementById("btnLogin");
  btn.innerText = "Entrando...";
  btn.disabled = true;
});
</script>

</body>
</html>
