<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body {
  margin:0;
  font-family: system-ui;
  background: linear-gradient(135deg, #020617, #1e293b, #2563eb);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card {
  background:white;
  padding:25px;
  border-radius:16px;
  width:90%;
  max-width:350px;
  animation: fadeIn 0.4s ease;
  box-shadow: 0 15px 40px rgba(0,0,0,0.25);
}

@keyframes fadeIn {
  from { opacity:0; transform:translateY(20px); }
  to { opacity:1; transform:translateY(0); }
}

input {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:1px solid #ddd;
  outline:none;
}

input:focus {
  border-color:#2563eb;
  box-shadow:0 0 0 2px rgba(37,99,235,0.2);
}

button {
  width:100%;
  padding:12px;
  margin-top:15px;
  background:#2563eb;
  color:white;
  border:none;
  border-radius:10px;
}

.error {
  background:#fee2e2;
  color:#991b1b;
  padding:10px;
  border-radius:8px;
  margin-top:10px;
  text-align:center;
}

.toggle {
  position:absolute;
  right:12px;
  top:50%;
  transform: translateY(-50%);
  cursor:pointer;
}

input {
  width:100%;
  box-sizing: border-box;
}
</style>
<h3 style="text-align:center;">requerimento.org</h3>
</head>

<body>

<div class="card">
  <h2>🔐 Login</h2>

  {% if error %}
    <div class="error">{{ error }}</div>
  {% endif %}

  <form method="POST">
    <input name="username" placeholder="Usuário" required>

    <div style="position:relative; width:100%;">
      <input id="password" name="password" type="password" placeholder="Senha" required style="padding-right:45px;">
      <span class="toggle" onclick="togglePassword()">👁️</span>
    </div>

    <label style="font-size:13px; display:flex; align-items:center; gap:6px; margin-top:10px;">
  <input type="checkbox" name="remember"> Lembrar de mim
  </label>

    <button>Entrar</button>
  </form>
  <div style="margin-top:10px; text-align:center;">
  <a href="/esqueci">Esqueci minha senha</a>
</div>
</div>



<script>
function togglePassword() {
  const input = document.getElementById("password");
  input.type = input.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
