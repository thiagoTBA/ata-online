<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta charset="UTF-8">
<title>Criar Conta</title>

<style>
body {
  margin:0;
  font-family: system-ui;
  background: linear-gradient(135deg, #020617, #1e293b);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:white;
}

.card {
  background:#1e293b;
  padding:30px;
  border-radius:16px;
  width:90%;
  max-width:360px;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
  animation: fadeIn 0.4s ease;
}

@keyframes fadeIn {
  from { opacity:0; transform:translateY(20px); }
  to { opacity:1; transform:translateY(0); }
}

h2 {
  text-align:center;
  margin-bottom:20px;
}

input {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:none;
  outline:none;
}

button {
  width:100%;
  padding:12px;
  margin-top:15px;
  background:#2563eb;
  color:white;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

button:hover {
  opacity:0.9;
}

.error {
  background:#7f1d1d;
  color:#fecaca;
  padding:10px;
  border-radius:8px;
  margin-top:10px;
  text-align:center;
}

.info {
  text-align:center;
  margin-top:10px;
  font-size:12px;
  color:#94a3b8;
}

.back {
  display:block;
  text-align:center;
  margin-top:10px;
  color:#60a5fa;
  text-decoration:none;
}
</style>
</head>

<body>

<div class="card">
  <h2>👤 Criar Conta</h2>

  {% if error %}
    <div class="error">{{ error }}</div>
  {% endif %}

  <form method="POST">

    <input name="username" placeholder="Usuário (CPF)" required>

    <input name="password" type="password" placeholder="Senha" required>

    <input name="register_key" type="password" placeholder="Código de acesso" required>

    <button>Cadastrar</button>

  </form>

  <div class="info">
    Código fornecido pela secretaria
  </div>

  <a class="back" href="/login">← Voltar para login</a>
</div>

</body>
</html>
