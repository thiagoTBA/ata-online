<h2>🏢 Painel Secretaria</h2>

<!-- cadastrar aluno -->
<form method="POST" action="/admin/create_user">
  <input name="username" placeholder="Nome">
  <input name="cpf" placeholder="CPF">
  <button>Cadastrar</button>
</form>

<hr>

{% for a in atas %}
<div class="card">

  <b>{{ a["aluno_nome"] }}</b><br>
  📄 {{ a["protocolo"] }}<br>
  📌 {{ tipos.get(a["tipo"]) }}<br>

  {% if not a["atendente"] %}
    <form method="POST" action="/atender/{{ a["id"] }}">
      <button>Atender</button>
    </form>
  {% endif %}

</div>
{% endfor %}
