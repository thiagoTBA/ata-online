<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Coordenação</title>

<style>
body {
  font-family: system-ui;
  background: #020617;
  color: white;
}

.card {
  background: #1e293b;
  padding: 15px;
  margin-bottom: 10px;
  border-radius: 10px;
}

textarea {
  width: 100%;
  height: 80px;
}

button {
  margin-top: 10px;
  padding: 6px;
  border-radius: 6px;
  border: none;
}
</style>
</head>

<body>

<h2>📌 Coordenação</h2>

{% for ata in atas %}
<div class="card">

  <p><b>Protocolo:</b> {{ ata.protocolo }}</p>
  <p><b>Aluno:</b> {{ ata.aluno_nome }}</p>
  <p><b>Tipo:</b> {{ tipos[ata.tipo] }}</p>

  {% if ata.status == "AGUARDANDO_COORD" %}
  <form method="POST" action="/parecer/{{ ata.id }}">
    
    <textarea name="parecer" required></textarea>

    <select name="status">
      <option value="DEFERIDO">Deferir</option>
      <option value="INDEFERIDO">Indeferir</option>
    </select>

    <button style="background: green;">Enviar</button>
  </form>

  {% else %}
    <span>✔ Processado</span>
  {% endif %}

</div>
{% endfor %}

</body>
</html>
